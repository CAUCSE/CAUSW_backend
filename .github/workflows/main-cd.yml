name: CD - Production

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app-main-build:
    name: Build & Deploy app-main Module in Github Actions
    runs-on: ubuntu-22.04

    steps:
      # 작업 엑세스 가능하게 $GITHUB_WORKSPACE에서 저장소를 체크아웃
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: main

      # JDK & Gradle 설정
      - name: Setup JDK and Gradle
        uses: ./.github/actions/setup-jdk-gradle

      # env 파일 추가
      - name: Copy .env from secret
        env:
          ENV_CONTENT: ${{ secrets.ENV_PROD }}
        run: |
            cat <<EOF > .env
            $ENV_CONTENT
            EOF

      # Flyway 마이그레이션
      - name: Run Flyway repair and migration
        run: |
          ./gradlew :app-main:flywayRepair || true
          ./gradlew :app-main:flywayMigrate

      # Build -> jar 파일 생성
      - name: Build app-main module
        run: ./gradlew clean :app-main:bootJar -x test

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-main-artifact
          path: "app-main/build/libs/*.jar"


  app-main-deploy:
    name: CD app-main Module with SSH
    needs: app-main-build
    runs-on: ubuntu-22.04

    steps:
      - name: Download Deployment Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-main-artifact

      # app-main JAR EC2에 전송
      - name: SCP app-main JAR to EC2
        if: github.actor != 'nektos/act'
        uses: appleboy/scp-action@master
        with:
          key: ${{ secrets.EC2_KEY_PROD }}
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER_PROD }}
          source: "*.jar"
          target: "/home/ubuntu/app/app-main"

      # .env를 Secret에서 직접 EC2에 생성
      - name: Write .env to EC2
        if: github.actor != 'nektos/act'
        uses: appleboy/ssh-action@master
        env:
          ENV_CONTENT: ${{ secrets.ENV_PROD }}
        with:
          key: ${{ secrets.EC2_KEY_PROD }}
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER_PROD }}
          envs: ENV_CONTENT
          script: |
            printf '%s' "$ENV_CONTENT" > /home/ubuntu/app/app-main/.env

      # Redis Server 구동
      - name: Start redis-server
        if: github.actor != 'nektos/act'
        uses: appleboy/ssh-action@master
        with:
          key: ${{ secrets.EC2_KEY_PROD }}
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER_PROD }}
          script: |
            sudo systemctl start redis-server

      # 기존 서버 종료 및 app-main JAR 실행
      - name: Deploy app-main
        if: github.actor != 'nektos/act'
        uses: appleboy/ssh-action@master
        with:
          key: ${{ secrets.EC2_KEY_PROD }}
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ${{ secrets.EC2_USER_PROD }}
          script: |
            sudo fuser -k -n tcp 8080 || true
            sleep 15
            APP_MAIN_JAR=$(ls -t /home/ubuntu/app/app-main/*.jar | head -n 1)
            sudo mkdir -p /var/log/spring-boot/app-main
            cd /home/ubuntu/app/app-main
            sudo nohup java -DLOG_DIR=/var/log/spring-boot/app-main -jar "$APP_MAIN_JAR" 1>/dev/null 2>&1 &


  notify:
    name: Discord Notify
    needs: [ app-main-deploy ]
    runs-on: ubuntu-22.04
    if: always()

    steps:
      # 작업 엑세스 가능하게 $GITHUB_WORKSPACE에서 저장소를 체크아웃
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Notify Success
        if: ${{ github.actor != 'nektos/act' && needs.app-main-deploy.result == 'success' }}
        uses: ./.github/actions/discord-notify
        with:
          status: success
          branch: ${{ github.ref_name }}
          sha: ${{ github.sha }}
          actor: ${{ github.actor }}
          run_id: ${{ github.run_id }}
          webhook: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL_MAIN }}
          role_id: ${{ secrets.DISCORD_BACKEND_ROLE_ID }}

      - name: Notify Failure
        if: ${{ github.actor != 'nektos/act' && needs.app-main-deploy.result != 'success' }}
        uses: ./.github/actions/discord-notify
        with:
          status: failure
          branch: ${{ github.ref_name }}
          sha: ${{ github.sha }}
          actor: ${{ github.actor }}
          run_id: ${{ github.run_id }}
          webhook: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL_MAIN }}
          role_id: ${{ secrets.DISCORD_BACKEND_ROLE_ID }}
