name: CD - Develop Env Restart

on:
  workflow_dispatch:
    inputs:
      restart_mode:
        description: "How to restart the dev app after writing ENV_DEV"
        required: true
        default: recreate
        type: choice
        options:
          - recreate
          - restart

permissions:
  contents: read

jobs:
  restart:
    name: Update .env and Restart Dev Container
    runs-on: ubuntu-22.04

    steps:
      - name: Write .env and restart container on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          ENV_CONTENT: ${{ secrets.ENV_DEV }}
          RESTART_MODE: ${{ inputs.restart_mode }}
        with:
          key: ${{ secrets.EC2_KEY_DEV }}
          host: ${{ secrets.EC2_HOST_DEV }}
          username: ${{ secrets.EC2_USER_DEV }}
          envs: ENV_CONTENT,RESTART_MODE
          script: |
            set -e

            mkdir -p /home/ubuntu/app/app-main
            printf '%s' "$ENV_CONTENT" > /home/ubuntu/app/app-main/.env

            sudo systemctl start redis-server
            sudo mkdir -p /var/log/spring-boot/app-main
            sudo chmod -R a+rwX /var/log/spring-boot/app-main

            if [ "$RESTART_MODE" = "restart" ]; then
              docker restart causw-app
              exit 0
            fi

            IMAGE=$(docker inspect --format='{{.Config.Image}}' causw-app 2>/dev/null || true)

            if [ -z "$IMAGE" ]; then
              echo "Could not determine current image for causw-app."
              exit 1
            fi

            docker stop causw-app || true
            docker rm causw-app || true

            docker run -d \
              --name causw-app \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file /home/ubuntu/app/app-main/.env \
              -v /var/log/spring-boot/app-main:/app/log \
              --add-host=host.docker.internal:host-gateway \
              "$IMAGE"

  notify:
    name: Discord Notify
    needs: [ restart ]
    runs-on: ubuntu-22.04
    if: always()

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Notify Success
        if: needs.restart.result == 'success'
        uses: ./.github/actions/discord-notify
        with:
          repository: ${{ github.repository }}
          status: success
          branch: ${{ github.ref_name }}
          sha: ${{ github.sha }}
          actor: ${{ github.actor }}
          run_id: ${{ github.run_id }}
          webhook: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL_DEV }}
          role_id: ${{ secrets.DISCORD_BACKEND_ROLE_ID }}

      - name: Notify Failure
        if: needs.restart.result != 'success'
        uses: ./.github/actions/discord-notify
        with:
          repository: ${{ github.repository }}
          status: failure
          branch: ${{ github.ref_name }}
          sha: ${{ github.sha }}
          actor: ${{ github.actor }}
          run_id: ${{ github.run_id }}
          webhook: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL_DEV }}
          role_id: ${{ secrets.DISCORD_BACKEND_ROLE_ID }}
