name: Spotless Check

on:
  pull_request:
    branches:
      - dev
    paths:
      - '**.java'

permissions:
  contents: read
  pull-requests: write

jobs:
  spotless-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK and Gradle
        uses: ./.github/actions/setup-jdk-gradle

      - name: Run Spotless Check
        run: ./gradlew spotlessCheck --no-daemon --stacktrace

      - name: Comment PR on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('Spotless 포매팅 검사가 실패했습니다.')
