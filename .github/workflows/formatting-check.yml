name: Spotless Check

on:
  pull_request:
    branches:
      - dev
    paths:
      - '**.java'

permissions:
  contents: read
  pull-requests: write

jobs:
  spotless-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK and Gradle
        uses: ./.github/actions/setup-jdk-gradle

      - name: Run Spotless Check
        run: ./gradlew spotlessCheck --no-daemon --stacktrace

      - name: Comment PR on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Spotless Check Failed**\n\n코드 포맷팅이 올바르지 않습니다. 다음 명령어를 실행하여 자동으로 수정하세요:\n\n```bash\n./gradlew spotlessApply\n```\n\n그 후 변경사항을 커밋하고 푸시해주세요.'
            })
            core.setFailed('Spotless check failed')
