name: Update D-n Labels

on:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00 = KST 09:00

permissions:
  contents: read
  pull-requests: write

jobs:
  d-day-labeler:
    runs-on: ubuntu-latest

    steps:
      # Step A: D-n 라벨 업데이트
      - name: Update D-n Labels
        uses: naver/d-day-labeler@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step B: 현재 D-1 / D-0 PR 감지 (상태 기준)
      - name: Detect D-1 / D-0 PRs
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              base: "dev"
            });

            const notify = [];

            for (const pr of pulls.data) {
              const dLabel = pr.labels.find(l => /^D-\d+$/.test(l.name));
              if (!dLabel) continue;

              const label = dLabel.name;

              if (label === "D-1" || label === "D-0") {
                notify.push({
                  number: pr.number,
                  title: pr.title,
                  url: pr.html_url,
                  prefix: label === "D-0" ? "🚨 [D-0]" : "⏳ [D-1]"
                });
              }
            }

            return notify;

      # Step C: Discord 알림
      - name: Send Discord notification
        if: ${{ steps.detect.outputs.result != '[]' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_PR_REMINDER_WEBHOOK_URL }}
        run: |
          content=$(echo '${{ steps.detect.outputs.result }}' | jq -r '
            .[] |
            (.prefix + " PR #" + (.number|tostring) + ": " + .title) + "\n" + .url + "\n"
          ')

          jq -n \
            --arg title "⏰ 마감 임박 PR 알림" \
            --arg body "$content" \
            '{content: ($title + "\n\n" + $body)}' \
          | curl -X POST \
              -H "Content-Type: application/json" \
              -d @- \
              "$DISCORD_WEBHOOK_URL"
