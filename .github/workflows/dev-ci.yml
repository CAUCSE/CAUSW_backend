name: CI - Develop

# dev 브랜치로 PR이 열리거나 업데이트될 때, 또는 'db-change' 라벨이 붙을 때 실행
on:
  pull_request:
    branches: [ "dev" ]
    types: [ opened, synchronize, reopened, ready_for_review, labeled ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'img/**'
      - '.gitignore'
      - 'LICENSE'

permissions:
  contents: read
  pull-requests: write
  checks: write

# 변경된 모듈 감지 및 라벨에 따른 Flyway 마이그레이션 테스트, JUnit 테스트 실행
jobs:
  flyway-version-check:
    name: Flyway Version Order Check
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-22.04
    steps:
      # fetch-depth: 0 — 베이스 브랜치와의 git diff를 위해 전체 히스토리 필요
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Flyway version order
        uses: ./.github/actions/flyway-version-check


  detect-changes:
    name: Detect Changed Modules
    if: ${{ !github.event.pull_request.draft && github.event.action != 'labeled' }}
    runs-on: ubuntu-22.04
    outputs:
      app-main: ${{ steps.filter.outputs.app-main }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app-main:
              - 'app-main/**'
              - 'global/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'

# PR에 'db-change' 라벨이 붙은 경우 Flyway 마이그레이션 테스트 실행
  migration-test:
    name: Flyway Migration Test in Github Actions
    if: ${{ !github.event.pull_request.draft && contains(github.event.pull_request.labels.*.name, 'db-change') }}
    runs-on: ubuntu-22.04

    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: test
          MYSQL_ROOT_PASSWORD: password
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ppassword"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      # 작업 엑세스 가능하게 $GITHUB_WORKSPACE에서 저장소를 체크아웃
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Run Flyway migration test
        uses: ./.github/actions/flyway-migration-test
        with:
          env-content: ${{ secrets.ENV_TEST }}
          env-name: test
          pr-head-sha: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.repository }}


  junit-test-app-main:
    name: JUnit Test app-main Module
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.app-main == 'true' }}
    runs-on: ubuntu-22.04

    steps:
      # 작업 엑세스 가능하게 $GITHUB_WORKSPACE에서 저장소를 체크아웃
      - name: Checkout branch
        uses: actions/checkout@v4

      # JDK & Gradle 설정
      - name: Setup JDK and Gradle
        uses: ./.github/actions/setup-jdk-gradle

      # git ignore한 yml 파일들 github secret에서 복사해 오기
      - name: Copy secrets for app-main
        env:
          APPLICATION_FILE: ${{ secrets.APPLICATION_PROFILE_DEV }}
          APPLICATION_DEV_FILE: ${{ secrets.APPLICATION_DEV }}
          DIR: ./app-main/src/main/resources

          APPLICATION_FILE_NAME: application.yml
          APPLICATION_DEV_FILE_NAME: application-dev.yml
        run: |
          mkdir -p $DIR
          touch $DIR/$APPLICATION_FILE_NAME
          touch $DIR/$APPLICATION_DEV_FILE_NAME
          echo "$APPLICATION_FILE" > $DIR/$APPLICATION_FILE_NAME
          echo "$APPLICATION_DEV_FILE" > $DIR/$APPLICATION_DEV_FILE_NAME

      # 테스트 실행
      - name: Test with Gradle (app-main)
        run: ./gradlew :app-main:test
        shell: bash

      # 테스트 실패 시 fail된 부분 마크
      - name: Publish check comment on test failure
        uses: mikepenz/action-junit-report@v3
        if: ${{ failure() }}
        with:
          report_paths: ./app-main/build/test-results/test/TEST-*.xml
          check_name: "JUnit Failure Report (app-main)"

      # 테스트 결과 아티팩트 업로드
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: app-main-test-results
          path: ./app-main/build/test-results/test


  junit-test-result-summary:
    name: Report JUnit Test Result Summary
    if: ${{ always() && !github.event.pull_request.draft && github.event.action != 'labeled' && (needs.junit-test-app-main.result == 'success' || needs.junit-test-app-main.result == 'failure') }}
    runs-on: ubuntu-22.04
    needs: [detect-changes, junit-test-app-main]

    steps:
      # 테스트 결과 아티팩트 다운로드
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: combined

      # 테스트 결과 출력
      - name: Comment Test Results Summary
        if: github.actor != 'nektos/act'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            combined/**/TEST-*.xml
          check_name: "Test Results Summary"
