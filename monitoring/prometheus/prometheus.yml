global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'causw-backend-local'
    metrics_path: '/actuator/prometheus'
    scheme: http
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'mysql-local'
    static_configs:
      - targets: ['mysqld-exporter:9104']

  - job_name: 'node-local'
    static_configs:
      - targets: ['node-exporter:9100']